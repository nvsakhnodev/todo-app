<!DOCTYPE html>
<html lang="ru">
    <head>                                                                         <!-- Структура сайта-->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width", initial-scale="1.0" /> <!-- чтобы было смотрибельно на телефоне-->
        <title>To do app</title>
        <link rel="stylesheet" href="style.css" /> 
    </head>
    <body>                                                                         <!-- что увидит пользователь-->

            </div>

            <ul id="taskList"></ul>                                    <!-- Пока пустой список, где позже будут задачи-->
        </div>

        <script src="script.js"></script>
